d React chart editor across ~12 chart types for public-sector data storytelling. Defined the units/dimensions model for multi-dimensional data segmentation. Co-piloted TypeScript adoption across the codebase.\"},{\"company\":\"Simply Measured\",\"role\":\"Senior Software Engineer\",\"start\":2015.5,\"end\":2018.08,\"color\":\"#3b97e0\",\"note\":\"Built DashCap — headless Express/Nightmare.js screenshot service for PDF/PNG dashboard exports. Shipped d3 word cloud Ember addon with strong client reception. Coordinated releases across 5 Ember.js apps.\"},{\"company\":\"MITRE\",\"role\":\"Software Engineer\",\"start\":2013.67,\"end\":2015.42,\"color\":\"#005b94\",\"note\":\"Built healthcare informatics tools under federal contract. MongoDB map-reduce enabled eCQM patient testing in seconds vs. days. Led FE on Crucible — one of the earliest HL7 FHIR interoperability validators.\"}]";

  function renderGantt() {
    const roles = JSON.parse(workJson);

    const YEAR_START = 2013.5;
    const YEAR_END = 2027.0;
    const RANGE = YEAR_END - YEAR_START;

    const now = (() => {
      const d = new Date();
      return d.getFullYear() + (d.getMonth() + d.getDate() / 31) / 12;
    })();

    function pct(year) {
      return (((year - YEAR_START) / RANGE) * 100).toFixed(3) + "%";
    }
    function pctNum(year) {
      return ((year - YEAR_START) / RANGE) * 100;
    }
    function hexAlpha(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    const gantt = document.getElementById("gantt");
    if (!gantt) return;
    gantt.innerHTML = "";
    const gridYears = [];
    for (let y = Math.ceil(YEAR_START); y <= Math.floor(YEAR_END); y++) gridYears.push(y);

    roles.forEach((r) => {
      const row = document.createElement("div");
      row.className = "gantt-row";

      const label = document.createElement("div");
      label.className = "gantt-label";
      label.innerHTML = `
      <div class="gantt-company">${r.company}</div>
      <div class="gantt-role">${r.role}</div>
    `;

      const track = document.createElement("div");
      track.className = "gantt-track";

      gridYears.forEach((y) => {
        const line = document.createElement("div");
        line.className = "year-line";
        line.style.left = pct(y);
        track.appendChild(line);
      });

      const todayLine = document.createElement("div");
      todayLine.className = "today-line";
      todayLine.style.left = pct(now);
      track.appendChild(todayLine);

      const bar = document.createElement("div");
      bar.className = "gantt-bar";
      bar.style.backgroundColor = hexAlpha(r.color, 0.82);
      const leftPct = pctNum(r.start);
      const widthPct = pctNum(r.end) - leftPct;
      bar.style.left = leftPct.toFixed(3) + "%";
      bar.style.width = widthPct.toFixed(3) + "%";

      const barLabel = document.createElement("div");
      barLabel.className = "gantt-bar-label";
      const startYear = Math.floor(r.start);
      const endLabel = r.end > now ? "now" : Math.floor(r.end);
      barLabel.textContent = `${startYear} – ${endLabel}`;
      bar.appendChild(barLabel);

      bar.addEventListener("mouseenter", (e) => showTooltip(e, r));
      bar.addEventListener("mousemove", moveTooltip);
      bar.addEventListener("mouseleave", hideTooltip);

      track.appendChild(bar);
      row.appendChild(label);
      row.appendChild(track);
      gantt.appendChild(row);
    });

    const axisTrack = document.getElementById("axis-track");
    axisTrack.innerHTML = "";
    [2014, 2016, 2018, 2020, 2022, 2024, 2026].forEach((y) => {
      const lbl = document.createElement("div");
      lbl.className = "axis-label";
      lbl.style.left = pct(y);
      lbl.textContent = y;
      axisTrack.appendChild(lbl);
    });

    const totalYears = Math.round(roles.reduce((s, r) => s + (r.end - r.start), 0));
    const statText = `${totalYears}+ years · ${roles.length} companies`;
    document.getElementById("tenure-sub").textContent = statText;
    document.getElementById("foot-stat").textContent = statText;

    const tooltip = document.getElementById("tooltip");

    function showTooltip(e, r) {
      const startY = Math.floor(r.start);
      const endY = r.end > now ? "present" : Math.floor(r.end);
      const dur = Math.round(r.end - r.start);
      tooltip.innerHTML = `
      <div class="tt-company">${r.company}</div>
      <div class="tt-role">${r.role}</div>
      <div class="tt-dates">${startY} – ${endY} · ${dur} yr${dur !== 1 ? "s" : ""}</div>
      <div class="tt-note">${r.note}</div>
    `;
      tooltip.classList.add("show");
      moveTooltip(e);
    }

    function moveTooltip(e) {
      const pad = 16;
      let x = e.clientX + pad;
      let y = e.clientY + pad;
      const tw = tooltip.offsetWidth;
      const th = tooltip.offsetHeight;
      if (x + tw > window.innerWidth - pad) x = e.clientX - tw - pad;
      if (y + th > window.innerHeight - pad) y = e.clientY - th - pad;
      tooltip.style.left = x + "px";
      tooltip.style.top = y + "px";
    }

    function hideTooltip() {
      tooltip.classList.remove("show");
    }
  } // end renderGantt

  document.addEventListener("astro:page-load", renderGantt);
})();</script>
